<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coal Pet Demo</title>
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Coal Pet Standard Demo</p>
          <h1>黑色煤球版像素 companion。</h1>
          <p class="lede">
            这版不追求现代插画感，重点是回到原项目那种像素风、独立小表演、轻微跳帧味道。先看角色语言对不对。
          </p>
          <div style="margin-top: 24px;">
            <a href="gallery.html" class="state-button is-active" style="display: inline-block; text-decoration: none;">✨ 前往形象实验室选妃 &rarr;</a>
          </div>
        </div>
        <div class="meta-card">
          <p class="meta-label">当前状态</p>
          <p class="meta-state" id="current-state">idle</p>
          <p class="meta-desc" id="state-description">待机，轻微呼吸、眨眼和眼神跟随。</p>
        </div>
      </section>

      <section class="stage-panel">
        <div class="control-strip">
          <div class="buttons">
            <button data-state="idle" class="state-button is-active">待机 (Idle)</button>
            <button data-state="thinking" class="state-button">思考 (Think)</button>
            <button data-state="working-typing" class="state-button">打字 (Typing)</button>
            <button data-state="working-building" class="state-button">建造 (Build)</button>
            <button data-state="juggling-single" class="state-button">杂耍 (Juggle)</button>
            <button data-state="juggling-multi" class="state-button">陪伴 (Multi Juggle)</button>
            <button data-state="error" class="state-button">报错 (Error)</button>
            <button data-state="happy" class="state-button">汪意跳跃 (Happy)</button>
            <button data-state="notification" class="state-button">通知 (Notify)</button>
            <button data-state="sweeping" class="state-button">扫地 (Sweep)</button>
            <button data-state="carrying" class="state-button">搬运 (Carry)</button>
            <button data-state="sleeping" class="state-button">睡觉 (Sleep)</button>
          </div>
          <button id="auto-toggle" class="ghost-button" aria-pressed="true">自动轮播：开</button>
        </div>



        <div class="stage" id="stage">
          <div class="stage-grid"></div>
          <div class="stage-caption">
            <span>像素风状态测试</span>
            <span>拖到右边缘进入 mini</span>
            <span>连续点击会炸毛</span>
          </div>

          <div class="pet-dock" id="pet-dock" data-state="idle" data-mini="false">
            <div class="pet-glow"></div>
            <div class="thought thought--thinking" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="thought thought--reminder" aria-hidden="true">!</div>
            <div class="sleep-z" aria-hidden="true">
              <span>z</span>
              <span>z</span>
              <span>z</span>
            </div>
            <div class="juggle-bits" aria-hidden="true">
              <span class="bit bit-a"></span>
              <span class="bit bit-b"></span>
              <span class="bit bit-c"></span>
            </div>
            <div class="pet-shell" id="pet-shell" role="img" aria-label="黑色煤球宠物">
              <svg class="pet-svg" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
                <ellipse class="pet-shadow" cx="48" cy="82" rx="16" ry="5" />

                <g class="pixel-body">
                  <g class="body-fill">
                    <!-- cube base (放大 3倍后的死板块砖) -->
                    <rect x="30" y="33" width="36" height="33" fill="#0a0705" />
                    <rect x="33" y="36" width="30" height="27" fill="#1c1815" />
                    <rect x="33" y="36" width="9" height="27" fill="#2c2521" />
                    <rect x="42" y="36" width="18" height="3" fill="#2c2521" />
                    <rect x="69" y="57" width="3" height="3" fill="#1c1815" />
                    <rect x="72" y="63" width="3" height="3" fill="#0a0705" />
                  </g>

                  <g class="limb-group leg-left">
                    <rect x="36" y="66" width="6" height="3" fill="#0a0705" />
                  </g>
                  <g class="limb-group leg-right">
                    <rect x="54" y="66" width="6" height="3" fill="#0a0705" />
                  </g>
                  <g class="limb-group arm-left">
                    <rect x="24" y="48" width="6" height="6" fill="#1c1815" />
                  </g>
                  <g class="limb-group arm-right">
                    <rect x="66" y="48" width="6" height="6" fill="#1c1815" />
                  </g>

                  <g class="eye eye-left">
                    <rect class="eye-white" x="36" y="42" width="6" height="6" fill="#f9f6f0" />
                    <rect class="pupil pupil-left" x="39" y="42" width="3" height="3" fill="#000000" />
                  </g>
                  <g class="eye eye-right">
                    <rect class="eye-white" x="54" y="42" width="6" height="6" fill="#f9f6f0" />
                    <rect class="pupil pupil-right" x="54" y="42" width="3" height="3" fill="#000000" />
                  </g>

                  <g class="working-dust prop-layer">
                    <!-- 放大了 dust -->
                    <rect x="18" y="64" width="6" height="6" fill="#e6a56f" />
                    <rect x="76" y="61" width="6" height="6" fill="#e6a56f" />
                    <rect x="78" y="67" width="6" height="6" fill="#e6a56f" />
                  </g>
                  <g class="prop-typing prop-layer">
                    <rect x="24" y="6" width="48" height="30" fill="#24292e" />
                    <rect x="24" y="6" width="48" height="6" fill="#444d56" />
                    <rect x="27" y="15" width="12" height="3" fill="#d98871" />
                    <rect x="27" y="18" width="30" height="3" fill="#28a745" />
                    <rect x="30" y="24" width="24" height="3" fill="#0366d6" />
                    <rect class="kb-base" x="21" y="66" width="54" height="12" fill="#aab1b8" />
                    <rect class="kb-keys" x="24" y="69" width="48" height="6" fill="#e1e4e8" />
                  </g>
                  <g class="prop-building prop-layer">
                    <path d="M 33 36 Q 48 18 63 36 Z" fill="#fcd34d" />
                    <rect x="30" y="36" width="36" height="3" fill="#fcd34d" />
                    <g class="prop-hammer">
                      <rect class="hammer-handle" x="75" y="40" width="3" height="15" fill="#886851" />
                      <rect class="hammer-head" x="72" y="38" width="9" height="6" fill="#959da5" />
                    </g>
                  </g>
                  <g class="prop-juggle-multi prop-layer">
                    <rect class="bit-multi bit-d" x="42" y="30" width="6" height="6" fill="#e04c38" />
                    <rect class="bit-multi bit-e" x="48" y="24" width="6" height="6" fill="#62c454" />
                    <rect class="bit-multi bit-f" x="54" y="30" width="6" height="6" fill="#56a8f5" />
                  </g>
                  <g class="prop-error prop-layer">
                    <text class="error-text" x="48" y="16" fill="#ef4444" font-family="monospace" font-size="18" font-weight="900" letter-spacing="-1" text-anchor="middle">ERROR</text>
                    <rect x="36" y="42" width="6" height="6" fill="#0a0705" />
                    <path d="M 36 42 L 42 48 M 42 42 L 36 48" stroke="#ef4444" stroke-width="2" />
                    <rect x="54" y="42" width="6" height="6" fill="#0a0705" />
                    <path d="M 54 42 L 60 48 M 60 42 L 54 48" stroke="#ef4444" stroke-width="2" />
                  </g>
                  <g class="prop-happy prop-layer">
                    <rect class="star-fx s-1" x="20" y="30" width="6" height="6" fill="#fbbf24" />
                    <rect class="star-fx s-2" x="70" y="20" width="6" height="6" fill="#fbbf24" />
                    <rect class="star-fx s-3" x="80" y="45" width="6" height="6" fill="#fbbf24" />
                  </g>
                  <g class="prop-exclamation prop-layer">
                    <rect x="66" y="16" width="6" height="15" fill="#f87171" />
                    <rect x="66" y="34" width="6" height="6" fill="#f87171" />
                  </g>
                  <g class="prop-sweep prop-layer">
                    <g class="prop-broom">
                      <rect class="broom-handle" x="65" y="30" width="3" height="36" fill="#b45309" />
                      <rect class="broom-brush" x="62" y="66" width="9" height="9" fill="#fcd34d" />
                    </g>
                  </g>
                  <g class="prop-carry prop-layer">
                    <rect x="39" y="27" width="18" height="9" fill="#3b82f6" />
                    <rect x="36" y="33" width="24" height="3" fill="#3b82f6" />
                    <g class="carry-box-wrap">
                      <rect class="carry-box" x="27" y="48" width="42" height="21" fill="#d97706" />
                      <rect class="carry-box-tape" x="27" y="54" width="42" height="3" fill="#78350f" />
                    </g>
                  </g>
                </g>
              </svg>
            </div>
          </div>
        </div>
      </section>
    </main>


    <script type="module" src="./app.js?v=2"></script>
  </body>
</html>
